    <linearGradient id="jar" x1="0" x2="1"><stop stop-color="#8d2716"/><stop offset=".5" stop-color="#ee5c2b"/><stop offset="1" stop-color="#6b170e"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#170803" flood-opacity=".42"/></filter>
  </defs>
