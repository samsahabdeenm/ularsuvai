<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">UlarSuvai original-style logo</title>
  <desc id="logoDesc">UlarSuvai Tamil and English wordmark with mountain illustration and The Essence of Dry tagline, adapted as a compact transparent web logo without changing the brand structure.</desc>
  <defs>
    <linearGradient id="bronze" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#9a6b38"/>
      <stop offset=".38" stop-color="#3d2112"/>
      <stop offset=".72" stop-color="#7a4a25"/>
      <stop offset="1" stop-color="#d8a55c"/>
    </linearGradient>
    <linearGradient id="lineGold" x1="0" x2="1">
      <stop offset="0" stop-color="#b47a33" stop-opacity=".25"/>
      <stop offset=".5" stop-color="#d2a15b"/>
      <stop offset="1" stop-color="#b47a33" stop-opacity=".25"/>
    </linearGradient>
    <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#241004" flood-opacity=".28"/>
      <feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#fff0d4" flood-opacity=".35"/>
    </filter>
  </defs>
  <path d="M338 262C430 92 651 34 824 77c135 34 253 120 324 260" fill="none" stroke="url(#lineGold)" stroke-width="5" stroke-linecap="round" opacity=".9"/>
  <g fill="none" stroke="#6b4728" stroke-linecap="round" stroke-linejoin="round" opacity=".95">
    <path d="M345 274l96-79 52 42 88-122 97 152 72-73 100 78 63-45 82 56" stroke-width="10"/>
    <path d="M442 195l-37 93m86-49l-39 70m128-193l-76 176m174-24l-43 73m115-146l-51 111m219-79l-43 68" stroke-width="7" opacity=".78"/>
  </g>
  <g filter="url(#depth)">
    <text x="126" y="468" font-family="Georgia, 'Times New Roman', serif" font-size="226" font-weight="700" fill="url(#bronze)">உலர்</text>
    <text x="930" y="454" font-family="Georgia, 'Times New Roman', serif" font-size="176" fill="url(#bronze)">suvai</text>
  </g>
  <path d="M151 499c273 58 508 53 778-4 169-36 330-30 519 41" fill="none" stroke="url(#lineGold)" stroke-width="13" stroke-linecap="round" opacity=".95"/>
  <g fill="#4b2b16" opacity=".94">
    <circle cx="806" cy="384" r="34"/>
  </g>
  <g font-family="Roboto, Arial, sans-serif" font-weight="700" letter-spacing="18" font-size="39" fill="#3f2415">
    <text x="800" y="612" text-anchor="middle">THE ESSENCE OF DRY</text>
  </g>
  <path d="M454 595h140m411 0h140" stroke="url(#lineGold)" stroke-width="4" stroke-linecap="round"/>
  <path d="M769 670c18-18 31-39 31-68 0 29 13 50 31 68-18-6-44-6-62 0Z" fill="url(#lineGold)"/>
  <path d="M450 637C542 690 681 713 800 710c121-4 258-31 350-88" fill="none" stroke="url(#lineGold)" stroke-width="5" stroke-linecap="round" opacity=".75"/>
</svg>
